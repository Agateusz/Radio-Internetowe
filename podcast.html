<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Poltech Podcast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="logo-container">
        <a href="index.html" class="active">
            <div class="logo-text">
                <img src="logo.jpg" alt="RadioAlfa4You Logo" class="logo-img">
                <span>RadioAlfa4You</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html" class="active">RADIO NA ŻYWO</a>
            <a href="podcast.html">DZISIEJSZA POGADANKA</a>
        </div>
    </nav>
</header>

<main class="main-layout">
    <div class="left-column">
        <section class="box video-box">
            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    frameborder="0" allowfullscreen>
                </iframe>
            </div>
        </section>

        <section class="box playlist-box">
            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed/videoseries?list=PLirAqAj4qnP2S0HEnH0v5DS3X69yZ3M0m" 
                    frameborder="0" allowfullscreen>
                </iframe>
            </div>
        </section>
    </div>

    <aside class="box description-column">
        <h3>Odcinek - Opis</h3>
        <p id="yt-description">Ładowanie opisu...</p>
    </aside>
</main>

<footer>
    <div class="footer-content">
        <p>&copy; 2026 Radio Alfa 4 You. Wszystkie prawa zastrzeżone.</p>
        <p class="credits">Wykonanie: <strong>Sych Agnieszka</strong> & <strong>Szlęzak Kajetan</strong></p>
    </div>
</footer>

<script>
const API_KEY = "AIzaSyCkovat4ywql3dwHVnixtmZhSQG47RH0k0";
const VIDEO_ID = "dQw4w9WgXcQ";

async function fetchDescription() {
    try {
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${VIDEO_ID}&key=${API_KEY}`
        );
        const data = await res.json();
        const desc = data.items[0].snippet.description;
        document.getElementById("yt-description").innerText = desc;
    } catch (error) {
        document.getElementById("yt-description").innerText = "Nie udało się pobrać opisu.";
        console.error(error);
    }
}

fetchDescription();
</script>

</body>
</html>
