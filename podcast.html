<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Poltech Podcast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
const API_KEY = "AIzaSyCkovat4ywql3dwHVnixtmZhSQG47RH0k0";
const MY_PLAYLIST_ID = "PLNu_RvGVX8vXIMzZjkyIvceRDLPl0k5YB"; 
let videoDataCache = []; // Tu przechowamy dane filmów

// Funkcja odświeżająca listę boczną
function renderSidebar(currentPlayingId) {
    const container = document.getElementById("other-videos-container");
    if (!container) return;

    container.innerHTML = ""; // Czyścimy listę

    videoDataCache.forEach((video, index) => {
        // Pomijamy tylko ten film, który aktualnie gra w dużym oknie
        if (video.id === currentPlayingId) return;

        const videoDiv = document.createElement('div');
        videoDiv.className = 'video-item-small';
        videoDiv.style.cursor = 'pointer';
        videoDiv.onclick = () => changeMainVideo(index);
        
        videoDiv.innerHTML = `
            <img src="${video.thumb}" alt="miniaturka">
            <span>${video.title}</span>
        `;
        container.appendChild(videoDiv);
    });
}

function changeMainVideo(index) {
    const video = videoDataCache[index];
    if (!video) return;

    const iframeEl = document.querySelector(".video-wrapper iframe");
    const titleEl = document.getElementById("yt-video-title");
    const descEl = document.getElementById("yt-description");

    // Ustawiamy wideo (z dodanym origin dla bezpieczeństwa)
    if (iframeEl) {
        iframeEl.src = `https://www.youtube.com/embed/${video.id}?autoplay=1&enablejsapi=1&origin=${window.location.protocol}//${window.location.host}`;
    }
    if (titleEl) titleEl.innerText = video.title;
    if (descEl) descEl.innerText = video.description;
    
    // Kluczowy moment: odświeżamy sidebar, żeby pokazać wszystkie filmy POZA tym wybranym
    renderSidebar(video.id);
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function fetchPodcastData() {
    try {
        const listRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${MY_PLAYLIST_ID}&maxResults=10&key=${API_KEY}`);
        const listData = await listRes.json();

        if (!listData.items || listData.items.length === 0) return;

        videoDataCache = listData.items.map(item => ({
            id: item.snippet.resourceId.videoId,
            title: item.snippet.title,
            description: item.snippet.description,
            thumb: item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.default.url
        }));

        // Start strony
        changeMainVideo(0);

    } catch (error) {
        console.error("Błąd ładowania:", error);
    }
}

fetchPodcastData();
</script>
    
<header>
    <nav class="logo-container">
     <a href="index.html" class="active">
        <div class="logo-text">
                <img src="logo.jpg" alt="RadioAlfa4You Logo" class="logo-img">
            <span>RadioAlfa4You</span>
        </div>
     </a>
        
        <div class="nav-links">
            <a href="index.html" class="active">RADIO NA ŻYWO</a>
            <a href="podcast.html">DZISIEJSZA POGADANKA</a>
        </div>
    </nav>
</header>

<main class="podcast-layout">
    <div class="podcast-main-content">
        <section class="podcast-video-box">
            <div class="video-wrapper">
                <iframe src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <h2 id="yt-video-title" class="podcast-episode-title">Ładowanie tytułu...</h2>
        </section>

        <section class="podcast-description-box">
            <h3>Opis odcinka</h3>
            <div id="yt-description">Ładowanie opisu...</div>
        </section>
    </div>

    <aside class="podcast-sidebar">
        <div class="sidebar-box">
            <h3>Inne filmy</h3>
            <div id="other-videos-container" class="related-videos-list">
                <p class="loading-text">Pobieranie listy...</p>
            </div>
        </div>
    </aside>
</main>

</body>
